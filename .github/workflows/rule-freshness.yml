name: Rule Freshness Check

on:
  schedule:
    - cron: "0 9 * * *" # 2am PST
  workflow_dispatch:

jobs:
  check-freshness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Run freshness checker
        run: npx ts-node scripts/checkFreshness.ts

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: freshness-report
          path: freshness-report.json