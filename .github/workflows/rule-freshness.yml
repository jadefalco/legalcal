name: Rule Freshness Check

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ingest authority bundle
        run: npm run ingest:authority

      - name: Run freshness checker
        run: npm run check:freshness

      - name: Run source change detector
        run: npm run check:source

      - name: Extract citations
        run: npm run extract:citations

      - name: Ingest citations
        run: npm run ingest:citations

      - name: Generate AI insights
        run: npx tsx scripts/generate-freshness-insights.ts

      - name: Generate scenario reasoning
        run: npx tsx scripts/generate-scenario-reasoning.ts

      - name: Run multi-scenario matrix
        run: npx tsx scripts/run-multi-scenario.ts --topic rent-increase --scenario "Proposed rent increase of 5% with 30 days' notice."

      - name: Generate checklist preview
        run: npx tsx scripts/generate-checklist.ts --topic rent-increase --jurisdiction bc --scenario "Proposed rent increase of 5% with 30 days' notice."

      - name: Generate risk scan
        run: npx tsx scripts/generate-risk.ts --topic rent-increase --jurisdiction bc --scenario "Proposed rent increase of 5% with 30 days' notice."

      - name: Generate heatmap
        run: npx tsx scripts/generate-heatmap.ts --topic rent-increase --scenario "Proposed rent increase of 5% with 30 days' notice."

      - name: Generate similarity matrix
        run: npx tsx scripts/generate-similarity.ts --topic rent-increase --scenario "Proposed rent increase of 5% with 30 days' notice." --k 4

      - name: Generate trend snapshot
        run: npx tsx scripts/generate-trends.ts --topic rent-increase --national --scenario "Proposed rent increase of 5% with 30 days' notice."

      - name: Generate forecast snapshot
        run: npx tsx scripts/generate-forecast.ts --topic rent-increase --national --scenario "Proposed rent increase of 5% with 30 days' notice."

      - name: Generate quarterly national report
        run: npx tsx scripts/generate-report.ts --quarterly --topics rent-increase --scenario "Proposed rent increase of 5% with 30 days' notice."

      - name: Upload national report artifact
        uses: actions/upload-artifact@v4
        with:
          name: national-regulatory-report
          path: reports/national/
          retention-days: 30

      - name: Detect topic coverage
        run: npx tsx scripts/detect-topic-coverage.ts

      - name: Generate changelog
        run: npm run changelog -- --since $(date -d '7 days ago' +%Y-%m-%d)

      - name: Create or update GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'NODE_SCRIPT' > /tmp/freshness-issue.js
          const fs = require("fs");
          const path = require("path");
          const { execSync } = require("child_process");

          function loadHistory(topic, jurisdiction) {
            const file = path.join("data", "rule-history", topic, `${jurisdiction}.json`);
            if (!fs.existsSync(file)) return [];
            try {
              return JSON.parse(fs.readFileSync(file, "utf-8"));
            } catch {
              return [];
            }
          }

          function loadCitationReport(topic, jurisdiction) {
            const file = path.join("reports", "citations", topic, `${jurisdiction}.json`);
            if (!fs.existsSync(file)) return null;
            try {
              return JSON.parse(fs.readFileSync(file, "utf-8"));
            } catch {
              return null;
            }
          }

          const report = JSON.parse(fs.readFileSync("reports/rule-freshness.json", "utf-8"));
          const affected = report.filter(r => r.freshness.warnings.length > 0);

          let sourceChanges = [];
          try {
            sourceChanges = JSON.parse(fs.readFileSync("reports/source-changes.json", "utf-8"));
          } catch {
            sourceChanges = [];
          }
          const changedSources = sourceChanges.filter(r => r.changed);
          const failedSources = sourceChanges.filter(r => r.error);

          let citationSummary = { totalAdded: 0, details: [] };
          try {
            const citationReportsDir = path.join("reports", "citations");
            if (fs.existsSync(citationReportsDir)) {
              const topics = fs.readdirSync(citationReportsDir).filter(d => {
                return fs.statSync(path.join(citationReportsDir, d)).isDirectory();
              });
              for (const topic of topics) {
                const topicDir = path.join(citationReportsDir, topic);
                const files = fs.readdirSync(topicDir).filter(f => f.endsWith(".json") && f !== "summary.json");
                for (const file of files) {
                  const content = JSON.parse(fs.readFileSync(path.join(topicDir, file), "utf-8"));
                  if (content.citations && content.citations.length > 0) {
                    citationSummary.totalAdded += content.citations.length;
                    citationSummary.details.push({
                      topic: content.topic,
                      jurisdiction: content.jurisdiction,
                      count: content.citations.length
                    });
                  }
                }
              }
            }
          } catch (e) {
            console.error("Failed to load citation reports:", e.message);
          }

          let insights = [];
          try {
            insights = JSON.parse(fs.readFileSync("reports/insights.json", "utf-8"));
          } catch {
            insights = [];
          }

          let scenarioReasoning = [];
          try {
            scenarioReasoning = JSON.parse(fs.readFileSync("reports/scenario-reasoning.json", "utf-8"));
          } catch {
            scenarioReasoning = [];
          }

          let multiScenario = null;
          try {
            const msd = path.join("reports", "multi-scenario");
            if (fs.existsSync(msd)) {
              const files = fs.readdirSync(msd).filter(f => f.endsWith(".json")).sort().reverse();
              if (files.length > 0) {
                multiScenario = JSON.parse(fs.readFileSync(path.join(msd, files[0]), "utf-8"));
              }
            }
          } catch (e) {
            console.error("Failed to load multi-scenario report:", e.message);
          }

          let checklistPreview = null;
          try {
            const cd = path.join("reports", "checklists");
            if (fs.existsSync(cd)) {
              const files = fs.readdirSync(cd).filter(f => f.endsWith(".json")).sort().reverse();
              if (files.length > 0) {
                checklistPreview = JSON.parse(fs.readFileSync(path.join(cd, files[0]), "utf-8"));
              }
            }
          } catch (e) {
            console.error("Failed to load checklist report:", e.message);
          }

          let riskScan = null;
          try {
            const rd = path.join("reports", "risk");
            if (fs.existsSync(rd)) {
              const files = fs.readdirSync(rd).filter(f => f.endsWith(".json") && !f.includes("national")).sort().reverse();
              if (files.length > 0) {
                riskScan = JSON.parse(fs.readFileSync(path.join(rd, files[0]), "utf-8"));
              }
            }
          } catch (e) {
            console.error("Failed to load risk report:", e.message);
          }

          let heatmap = null;
          try {
            const hd = path.join("reports", "heatmaps");
            if (fs.existsSync(hd)) {
              const files = fs.readdirSync(hd).filter(f => f.endsWith(".json")).sort().reverse();
              if (files.length > 0) {
                heatmap = JSON.parse(fs.readFileSync(path.join(hd, files[0]), "utf-8"));
              }
            }
          } catch (e) {
            console.error("Failed to load heatmap report:", e.message);
          }

          let similarity = null;
          try {
            const sd = path.join("reports", "similarity");
            if (fs.existsSync(sd)) {
              const files = fs.readdirSync(sd).filter(f => f.endsWith(".json")).sort().reverse();
              if (files.length > 0) {
                similarity = JSON.parse(fs.readFileSync(path.join(sd, files[0]), "utf-8"));
              }
            }
          } catch (e) {
            console.error("Failed to load similarity report:", e.message);
          }

          let trends = null;
          try {
            const td = path.join("reports", "trends", "rent-increase");
            if (fs.existsSync(td)) {
              const files = fs.readdirSync(td).filter(f => f.startsWith("national-") && f.endsWith(".json")).sort().reverse();
              if (files.length > 0) {
                trends = JSON.parse(fs.readFileSync(path.join(td, files[0]), "utf-8"));
              }
            }
          } catch (e) {
            console.error("Failed to load trend report:", e.message);
          }

          let forecast = null;
          try {
            const fd = path.join("reports", "forecast", "rent-increase");
            if (fs.existsSync(fd)) {
              const files = fs.readdirSync(fd).filter(f => f.startsWith("national-") && f.endsWith(".json")).sort().reverse();
              if (files.length > 0) {
                forecast = JSON.parse(fs.readFileSync(path.join(fd, files[0]), "utf-8"));
              }
            }
          } catch (e) {
            console.error("Failed to load forecast report:", e.message);
          }

          let topicCoverage = null;
          try {
            const tcFile = path.join("reports", "topics", "coverage.json");
            if (fs.existsSync(tcFile)) {
              topicCoverage = JSON.parse(fs.readFileSync(tcFile, "utf-8"));
            }
          } catch (e) {
            console.error("Failed to load topic coverage:", e.message);
          }

          let quarterlyReport = null;
          try {
            const qd = path.join("reports", "national");
            if (fs.existsSync(qd)) {
              const files = fs.readdirSync(qd).filter(f => f.startsWith("quarterly-") && f.endsWith(".json")).sort().reverse();
              if (files.length > 0) {
                quarterlyReport = JSON.parse(fs.readFileSync(path.join(qd, files[0]), "utf-8"));
              }
            }
          } catch (e) {
            console.error("Failed to load quarterly report:", e.message);
          }

          const hasAnyAlert = affected.length > 0 || changedSources.length > 0 || failedSources.length > 0 || citationSummary.totalAdded > 0 || insights.length > 0 || scenarioReasoning.length > 0 || multiScenario !== null || checklistPreview !== null || riskScan !== null || heatmap !== null || similarity !== null || trends !== null || forecast !== null || (topicCoverage && topicCoverage.length > 0) || quarterlyReport !== null;

          if (!hasAnyAlert) {
            console.log("All rules are fresh, sources are unchanged, and no new citations or insights were found. No issue needed.");
            process.exit(0);
          }

          const today = new Date().toISOString().split("T")[0];
          const title = `Rule Freshness Alert — ${today}`;

          const expired = affected.filter(r => r.freshness.isExpired);
          const stale = affected.filter(r => r.freshness.isStale);
          const missing = affected.filter(r => r.freshness.missingNextYear);

          let body = `## Rule Freshness Summary\n\n`;
          body += `> Monitoring **${report.length}** rules across all jurisdictions (Canada + US).\n\n`;
          body += `| Category | Count |\n`;
          body += `|----------|-------|\n`;
          body += `| Expired | ${expired.length} |\n`;
          body += `| Stale | ${stale.length} |\n`;
          body += `| Missing Next Year | ${missing.length} |\n`;
          body += `| Source Pages Changed | ${changedSources.length} |\n`;
          body += `| Source Fetches Failed | ${failedSources.length} |\n`;
          body += `| **New Citations Added** | **${citationSummary.totalAdded}** |\n`;
          body += `| **AI Insights Generated** | **${insights.length}** |\n`;
          body += `| **Scenario Reasoning Tests** | **${scenarioReasoning.length}** |\n`;
          body += `| **Multi-Scenario Matrix** | **${multiScenario ? multiScenario.results.length : 0}** |\n`;
          body += `| **Checklist Preview** | **${checklistPreview ? '1' : '0'}** |\n`;
          body += `| **Risk Scan** | **${riskScan ? '1' : '0'}** |\n`;
          body += `| **Heatmap** | **${heatmap ? '1' : '0'}** |\n`;
          body += `| **Similarity Matrix** | **${similarity ? '1' : '0'}** |\n`;
          body += `| **Trend Snapshot** | **${trends ? '1' : '0'}** |\n`;
          body += `| **Forecast Snapshot** | **${forecast ? '1' : '0'}** |\n`;
          body += `| **Topic Coverage** | **${topicCoverage ? topicCoverage.length : 0}** |\n`;
          body += `| **Total Rule Warnings** | **${affected.length}** |\n\n`;

          if (affected.length > 0) {
            body += `---\n\n`;
            body += `## Affected Rules\n\n`;
            for (const item of affected) {
              const history = loadHistory(item.topic, item.jurisdiction);
              const latest = history[history.length - 1];
              body += `### ${item.topic} / ${item.jurisdiction.toUpperCase()}\n\n`;
              body += `- **Status:** ${item.freshness.isExpired ? "Expired" : item.freshness.missingNextYear ? "Missing Next Year" : "Stale"}\n`;
              body += `- **Warnings:** ${item.freshness.warnings.join("; ")}\n`;
              if (latest) {
                body += `- **Last Version:** ${latest.version}\n`;
              }
              body += `- **Detail:** [View rule details](/admin/rules/${item.topic}/${item.jurisdiction})\n`;
              body += `- **History:** [View history](/admin/rules/${item.topic}/${item.jurisdiction}/history)\n\n`;
            }
          }

          if (changedSources.length > 0 || failedSources.length > 0) {
            body += `---\n\n`;
            body += `## Source URL Changes\n\n`;
            for (const item of changedSources) {
              const history = loadHistory(item.topic, item.jurisdiction);
              const latest = history[history.length - 1];
              body += `- **${item.topic} / ${item.jurisdiction}** — Source page changed ([URL](${item.url}))`;
              if (latest) {
                body += ` — Last version: \`${latest.version}\``;
              }
              body += ` — [History](/admin/rules/${item.topic}/${item.jurisdiction}/history)\n`;
            }
            for (const item of failedSources) {
              body += `- **${item.topic} / ${item.jurisdiction}** — Fetch failed ([URL](${item.url}))\n`;
            }
            body += `\n`;
          }

          if (citationSummary.totalAdded > 0) {
            body += `---\n\n`;
            body += `## New Citations Added\n\n`;
            for (const item of citationSummary.details) {
              body += `- **${item.topic} / ${item.jurisdiction}** — ${item.count} citation${item.count !== 1 ? 's' : ''}\n`;
            }
            body += `\n`;
          }

          if (insights.length > 0) {
            body += `---\n\n`;
            body += `## AI Insight Summary\n\n`;
            for (const item of insights) {
              body += `- **${item.topic} / ${item.jurisdiction}** → "${item.explanation}"\n`;
            }
            body += `\n`;
          }

          if (scenarioReasoning.length > 0) {
            body += `---\n\n`;
            body += `## Scenario Reasoning Check\n\n`;
            for (const item of scenarioReasoning.slice(0, 10)) {
              body += `- **${item.topic} / ${item.jurisdiction}** → "${item.outcome}"\n`;
            }
            if (scenarioReasoning.length > 10) {
              body += `\n*…and ${scenarioReasoning.length - 10} more*\n`;
            }
            body += `\n`;
          }

          if (multiScenario) {
            body += `---\n\n`;
            body += `## Multi-Scenario Check (Sample Scenario)\n\n`;
            body += `> **Scenario:** ${multiScenario.scenario}\n\n`;
            body += `| Jurisdiction | Analysis | Compliance | Outcome |\n`;
            body += `|--------------|----------|------------|---------|\n`;
            for (const r of multiScenario.results.slice(0, 20)) {
              const analysisLabel = r.analysis.potentialIssues.length > 0
                ? `${r.analysis.potentialIssues.length} issue(s)`
                : r.isPlaceholder ? "No data" : "OK";
              const complianceLabel = r.compliance.warnings.length > 0
                ? `${r.compliance.steps.length} steps, ${r.compliance.warnings.length} warning(s)`
                : `${r.compliance.steps.length} steps`;
              const outcomeLabel = r.outcome.factors.length > 0
                ? `${r.outcome.factors.length} factor(s)`
                : "Neutral";
              body += `| ${r.jurisdiction.toUpperCase()} | ${analysisLabel} | ${complianceLabel} | ${outcomeLabel} |\n`;
            }
            if (multiScenario.results.length > 20) {
              body += `\n*…and ${multiScenario.results.length - 20} more jurisdictions*\n`;
            }
            body += `\n`;
          }

          if (checklistPreview) {
            body += `---\n\n`;
            body += `## Checklist Preview (Sample Scenario)\n\n`;
            body += `> **Scenario:** Proposed rent increase of 5% with 30 days' notice.\n\n`;
            body += `| Jurisdiction | Preconditions | Steps | Warnings |\n`;
            body += `|--------------|---------------|-------|----------|\n`;
            body += `| ${checklistPreview.title.split(" — ")[1]?.split(" ")[0] || "BC"} | ${checklistPreview.preconditions.length} | ${checklistPreview.steps.length} | ${checklistPreview.warnings.length} |\n`;
            body += `\n`;
            body += `**Citations:** ${checklistPreview.citations.join(", ") || "None"}\n\n`;
          }

          if (riskScan) {
            body += `---\n\n`;
            body += `## Risk Scan (Sample Scenario)\n\n`;
            body += `> **Scenario:** Proposed rent increase of 5% with 30 days' notice.\n\n`;
            body += `| Jurisdiction | Structural | Procedural | Documentation | Overall |\n`;
            body += `|--------------|------------|------------|---------------|---------|\n`;
            body += `| ${riskScan.jurisdiction?.toUpperCase() || "BC"} | ${riskScan.structuralRisk} | ${riskScan.proceduralRisk} | ${riskScan.documentationRisk} | ${riskScan.overallRisk} |\n`;
            body += `\n`;
            if (riskScan.factors && riskScan.factors.length > 0) {
              body += `**Factors:** ${riskScan.factors.slice(0, 5).join("; ")}\n\n`;
            }
          }

          if (heatmap) {
            body += `---\n\n`;
            body += `## Heatmap Summary (Sample Scenario)\n\n`;
            const ca = heatmap.results.filter(r => r.country === "CA");
            const us = heatmap.results.filter(r => r.country === "US");
            const caHigh = ca.filter(r => !r.isPlaceholder && r.overallRisk === "high").length;
            const caMedium = ca.filter(r => !r.isPlaceholder && r.overallRisk === "medium").length;
            const caLow = ca.filter(r => !r.isPlaceholder && r.overallRisk === "low").length;
            const caPlaceholder = ca.filter(r => r.isPlaceholder).length;
            const usHigh = us.filter(r => !r.isPlaceholder && r.overallRisk === "high").length;
            const usMedium = us.filter(r => !r.isPlaceholder && r.overallRisk === "medium").length;
            const usLow = us.filter(r => !r.isPlaceholder && r.overallRisk === "low").length;
            const usPlaceholder = us.filter(r => r.isPlaceholder).length;
            body += `- **Canada:** ${caHigh} high, ${caMedium} medium, ${caLow} low, ${caPlaceholder} placeholder\n`;
            body += `- **United States:** ${usHigh} high, ${usMedium} medium, ${usLow} low, ${usPlaceholder} placeholder\n\n`;
            body += `| Jurisdiction | Overall | Structural | Procedural | Documentation |\n`;
            body += `|--------------|---------|------------|------------|---------------|\n`;
            for (const r of heatmap.results.slice(0, 10)) {
              body += `| ${r.jurisdiction.toUpperCase()} | ${r.isPlaceholder ? "placeholder" : r.overallRisk} | ${r.structuralRisk} | ${r.proceduralRisk} | ${r.documentationRisk} |\n`;
            }
            if (heatmap.results.length > 10) {
              body += `\n*…and ${heatmap.results.length - 10} more*\n`;
            }
            body += `\n`;
          }

          if (similarity) {
            body += `---\n\n`;
            body += `## Similarity Matrix (Sample Scenario)\n\n`;
            const valid = similarity.vectors ? similarity.vectors.filter(v => !v.isPlaceholder).length : 0;
            const placeholder = similarity.vectors ? similarity.vectors.filter(v => v.isPlaceholder).length : 0;
            body += `**Jurisdictions analyzed:** ${similarity.matrix ? similarity.matrix.length : 0} · **Valid rules:** ${valid} · **Placeholders:** ${placeholder}\n\n`;
            if (similarity.clusters && similarity.clusters.length > 0) {
              body += `### Clusters\n\n`;
              for (const c of similarity.clusters) {
                body += `- **Cluster ${c.clusterId + 1}:** ${c.memberNames.join(", ")}\n`;
              }
              body += `\n`;
            }
            body += `### Most Similar Pairs (Top 10)\n\n`;
            const pairs = [];
            const seen = new Set();
            for (const row of similarity.matrix || []) {
              for (const sim of row.similarities || []) {
                const key = [row.jurisdiction, sim.jurisdiction].sort().join("-");
                if (!seen.has(key) && sim.score > 0.5) {
                  seen.add(key);
                  pairs.push({ a: row.jurisdiction, b: sim.jurisdiction, score: sim.score });
                }
              }
            }
            pairs.sort((a, b) => b.score - a.score);
            for (const p of pairs.slice(0, 10)) {
              body += `- ${p.a.toUpperCase()} ↔ ${p.b.toUpperCase()}: ${(p.score * 100).toFixed(1)}%\n`;
            }
            body += `\n`;
          }

          if (trends) {
            body += `---\n\n`;
            body += `## Trend Snapshot (Sample Scenario)\n\n`;
            const topVolatile = (trends.jurisdictions || []).slice(0, 10);
            for (const j of topVolatile) {
              const arrow = j.trendDirection === "tightening" ? "↗️" : j.trendDirection === "loosening" ? "↘️" : "➡️";
              body += `- **${j.name} (${j.jurisdiction.toUpperCase()}):** ${arrow} ${j.trendDirection}, volatility ${j.volatilityScore.toFixed(2)}\n`;
            }
            if ((trends.jurisdictions || []).length > 10) {
              body += `\n*…and ${trends.jurisdictions.length - 10} more jurisdictions*\n`;
            }
            body += `\n`;
          }

          if (forecast) {
            body += `---\n\n`;
            body += `## Forecast Snapshot (Sample Scenario)\n\n`;
            const topPredicted = (forecast.jurisdictions || []).slice(0, 10);
            for (const j of topPredicted) {
              const arrow = j.trendDirection === "tightening" ? "↗️" : j.trendDirection === "loosening" ? "↘️" : "➡️";
              body += `- **${j.name} (${j.jurisdiction.toUpperCase()}):** predicted ${j.predictedRisk.toUpperCase()} risk (confidence ${(j.confidence * 100).toFixed(0)}%) — ${arrow} ${j.trendDirection}\n`;
            }
            if ((forecast.jurisdictions || []).length > 10) {
              body += `\n*…and ${forecast.jurisdictions.length - 10} more jurisdictions*\n`;
            }
            body += `\n`;
          }

          if (topicCoverage && topicCoverage.length > 0) {
            body += `---\n\n`;
            body += `## Topic Coverage\n\n`;
            for (const tc of topicCoverage) {
              const status = tc.real === tc.total ? "✅ complete" : `${tc.real}/${tc.total} real (${tc.placeholder} placeholders)`;
              body += `- **${tc.label || tc.id}:** ${status}\n`;
            }
            body += `\n`;
          }

          if (quarterlyReport) {
            body += `---\n\n`;
            body += `## National Regulatory Snapshot\n\n`;
            for (const t of quarterlyReport.topics || []) {
              const topicTitle = t.topic.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
              body += `### ${topicTitle}\n\n`;

              const highRisk = (t.nationalRisk?.results || []).filter(r => r.overallRisk === "high").slice(0, 5);
              body += `**Highest-risk jurisdictions this quarter:**\n`;
              if (highRisk.length > 0) {
                for (const r of highRisk) {
                  body += `- ${r.name} (${r.jurisdiction.toUpperCase()})\n`;
                }
              } else {
                body += `- No high-risk jurisdictions.\n`;
              }
              body += `\n`;

              const volatile = (t.nationalTrends?.jurisdictions || []).slice().sort((a, b) => b.volatilityScore - a.volatilityScore).slice(0, 5);
              body += `**Most volatile jurisdictions:**\n`;
              if (volatile.length > 0) {
                for (const j of volatile) {
                  body += `- ${j.name} (${j.jurisdiction.toUpperCase()}) — volatility ${j.volatilityScore.toFixed(2)}\n`;
                }
              } else {
                body += `- No volatility data.\n`;
              }
              body += `\n`;

              const tightening = (t.nationalTrends?.jurisdictions || []).filter(j => j.trendDirection === "tightening").length;
              const loosening = (t.nationalTrends?.jurisdictions || []).filter(j => j.trendDirection === "loosening").length;
              const stable = (t.nationalTrends?.jurisdictions || []).filter(j => j.trendDirection === "stable").length;
              body += `**Tightening vs loosening:** ${tightening} tightening, ${loosening} loosening, ${stable} stable\n\n`;

              const forecastHigh = (t.nationalForecast?.jurisdictions || []).filter(j => j.predictedRisk === "high").slice(0, 5);
              body += `**Forecasted high-risk jurisdictions:**\n`;
              if (forecastHigh.length > 0) {
                for (const j of forecastHigh) {
                  body += `- ${j.name} (${j.jurisdiction.toUpperCase()}) — predicted ${j.predictedRisk} (${(j.confidence * 100).toFixed(0)}% confidence)\n`;
                }
              } else {
                body += `- No forecasted high-risk jurisdictions.\n`;
              }
              body += `\n`;

              body += `**Topic coverage summary:** ${t.coverage?.real || 0}/${t.coverage?.total || 0} real rules (${t.coverage?.coveragePercent || 0}%)\n\n`;
            }
          }

          const sevenDaysAgo = new Date();
          sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
          const sinceParam = sevenDaysAgo.toISOString().split("T")[0];

          body += `---\n\n`;
          body += `## Recent Changes\n\n`;
          body += `[View full changelog](/admin/changelog?since=${sinceParam})\n\n`;
          body += `---\n\n`;
          body += `*This issue was auto-generated by the nightly rule-freshness check.*`;

          let existingNumber = null;
          try {
            const list = execSync(
              `gh issue list --repo "${process.env.GITHUB_REPOSITORY}" --search "${title}" --json number --limit 1`,
              { encoding: "utf-8" }
            );
            const issues = JSON.parse(list);
            if (issues.length > 0) {
              existingNumber = issues[0].number;
            }
          } catch (e) {
            console.error("Failed to list issues:", e.message);
          }

          const writeBody = (text) => {
            const tmp = `/tmp/issue-body-${Date.now()}.md`;
            fs.writeFileSync(tmp, text, "utf-8");
            return tmp;
          };

          if (existingNumber) {
            console.log(`Commenting on existing issue #${existingNumber}`);
            const tmp = writeBody(body);
            execSync(`gh issue comment ${existingNumber} --repo "${process.env.GITHUB_REPOSITORY}" --body-file "${tmp}"`);
          } else {
            console.log("Creating new issue");
            const tmp = writeBody(body);
            execSync(`gh issue create --repo "${process.env.GITHUB_REPOSITORY}" --title "${title}" --body-file "${tmp}" --label "rule-freshness,automated"`);
          }
          NODE_SCRIPT
          node /tmp/freshness-issue.js
